<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie Erker — Engineering & Business</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>

/* ─── DESIGN TOKENS ───────────────────────────────────────────── */
:root {
  --navy:        #0d1b2a;
  --navy-mid:    #162234;
  --navy-light:  #1e3048;
  --gold:        #c9a84c;
  --gold-light:  #e8c97a;
  --gold-dim:    rgba(201,168,76,0.18);
  --cream:       #faf8f3;
  --cream-dark:  #f0ede5;
  --text-dark:   #0d1b2a;
  --text-mid:    #3a4a5c;
  --text-muted:  #7a8a9a;
  --border:      rgba(201,168,76,0.2);
  --serif:       'DM Serif Display', Georgia, serif;
  --sans:        'DM Sans', system-ui, sans-serif;
  --ease:        cubic-bezier(0.25, 1, 0.5, 1);
  --ease-in:     cubic-bezier(0.4, 0, 1, 1);
  --ease-out:    cubic-bezier(0, 0, 0.2, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── RESET ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--text-dark);
  line-height: 1.65;
  overflow-x: hidden;
  cursor: none;
}
a { color: inherit; text-decoration: none; cursor: none; }
img { display: block; max-width: 100%; }

/* ─── CUSTOM CURSOR ───────────────────────────────────────────── */
#cursor-dot {
  position: fixed;
  top: 0; left: 0;
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s var(--ease), height 0.2s var(--ease), background 0.2s;
  will-change: transform;
}
#cursor-ring {
  position: fixed;
  top: 0; left: 0;
  width: 36px; height: 36px;
  border: 1px solid rgba(201,168,76,0.5);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.35s var(--ease), height 0.35s var(--ease),
              border-color 0.35s, background 0.35s;
  will-change: transform;
}
body.cursor-hover #cursor-dot { width: 10px; height: 10px; }
body.cursor-hover #cursor-ring {
  width: 56px; height: 56px;
  border-color: rgba(201,168,76,0.8);
  background: rgba(201,168,76,0.05);
}
body.cursor-dark #cursor-dot { background: var(--gold); }
body.cursor-dark #cursor-ring { border-color: rgba(201,168,76,0.4); }

/* ─── SCROLL PROGRESS ─────────────────────────────────────────── */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 2px;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  z-index: 200;
  transition: width 0.05s linear;
}

/* ─── LOADING SCREEN ──────────────────────────────────────────── */
#loader {
  position: fixed;
  inset: 0;
  background: var(--navy);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.6s var(--ease), visibility 0.6s;
}
#loader.hidden { opacity: 0; visibility: hidden; }
#loader-logo {
  font-family: var(--serif);
  font-size: 1.4rem;
  color: var(--gold-light);
  letter-spacing: 0.08em;
  opacity: 0;
  transform: translateY(12px);
  animation: loaderReveal 0.6s var(--ease) 0.2s forwards;
}
@keyframes loaderReveal {
  to { opacity: 1; transform: translateY(0); }
}

/* ─── NAVIGATION ──────────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 3rem;
  transition: background 0.4s var(--ease),
              border-color 0.4s var(--ease),
              padding 0.4s var(--ease);
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(13,27,42,0.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-color: rgba(201,168,76,0.12);
  padding: 0.9rem 3rem;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: var(--gold-light);
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.3s, transform 0.3s, color 0.25s;
}
.nav-logo:hover { color: #fff; }
.nav-resume {
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(201,168,76,0.3);
  padding: 0.5rem 1.1rem;
  transition: color 0.25s, border-color 0.25s, background 0.25s;
  opacity: 0;
  transform: translateY(-8px);
}
.nav-resume:hover {
  color: var(--gold-light);
  border-color: var(--gold);
  background: rgba(201,168,76,0.06);
}
.nav-in {
  opacity: 1 !important;
  transform: translateY(0) !important;
}

/* ─── HERO ────────────────────────────────────────────────────── */
.hero {
  min-height: 100vh;
  min-height: 100svh; /* trims browser chrome on iOS */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 9rem 3rem 5rem;
  background: var(--navy);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 55% at 72% 35%, rgba(201,168,76,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 35% 50% at 15% 75%, rgba(201,168,76,0.04) 0%, transparent 60%);
  pointer-events: none;
}
/* subtle grain */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.6;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  max-width: 1080px;
  width: 100%;
  align-items: center;
  position: relative;
  z-index: 1;
}
.hero-eyebrow {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.8rem;
  overflow: hidden;
}
.hero-eyebrow-line {
  display: block;
  width: 0;
  height: 1px;
  background: var(--gold);
  transition: width 0.8s var(--ease) 0.6s;
}
.hero-eyebrow-line.expanded { width: 32px; }
.hero-eyebrow-text {
  opacity: 0;
  transform: translateX(-8px);
  transition: opacity 0.6s var(--ease) 0.7s, transform 0.6s var(--ease) 0.7s;
}
.hero-eyebrow-text.visible { opacity: 1; transform: translateX(0); }

.hero-name {
  font-family: var(--serif);
  font-size: clamp(3.2rem, 6vw, 5.2rem);
  color: #fff;
  line-height: 1.0;
  margin-bottom: 1.5rem;
  overflow: hidden;
}
.hero-name-line {
  display: block;
  overflow: hidden;
}
.hero-name-inner {
  display: block;
  transform: translateY(110%);
  transition: transform 0.9s var(--ease);
}
.hero-name-inner.visible { transform: translateY(0); }
.hero-name-inner em { font-style: italic; color: var(--gold-light); }

.hero-bullets {
  list-style: none;
  margin-bottom: 2.5rem;
}
.hero-bullets li {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.5);
  padding: 0.45rem 0;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  opacity: 0;
  transform: translateX(-12px);
  transition: opacity 0.5s var(--ease), transform 0.5s var(--ease), color 0.25s;
}
.hero-bullets li:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
.hero-bullets li:hover { color: rgba(255,255,255,0.8); }
.hero-bullets li.visible { opacity: 1; transform: translateX(0); }
.bullet-dot {
  width: 4px; height: 4px;
  background: var(--gold);
  border-radius: 50%;
  flex-shrink: 0;
  transition: transform 0.3s var(--ease-spring);
}
.hero-bullets li:hover .bullet-dot { transform: scale(1.8); }

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 0.8rem;
  padding: 0.9rem 1.85rem;
  border: 1px solid var(--gold);
  color: var(--gold-light);
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.6s var(--ease), transform 0.6s var(--ease),
              background 0.3s, color 0.3s, border-color 0.3s;
  position: relative;
  overflow: hidden;
}
.hero-cta::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s var(--ease);
}
.hero-cta:hover::before { transform: scaleX(1); }
.hero-cta span { position: relative; z-index: 1; }
.hero-cta:hover { color: var(--navy); border-color: var(--gold); }
.hero-cta-arrow {
  position: relative;
  z-index: 1;
  display: inline-block;
  transition: transform 0.3s var(--ease-spring);
}
.hero-cta:hover .hero-cta-arrow { transform: translateX(5px); }
.hero-cta.visible { opacity: 1; transform: translateY(0); }

/* Hero right panel */
.hero-right {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s var(--ease) 0.9s, transform 0.8s var(--ease) 0.9s;
}
.hero-right.visible { opacity: 1; transform: translateY(0); }
.recents-label {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.65rem;
}
.recents-label::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--gold);
}
.recent-card {
  border: 1px solid rgba(201,168,76,0.15);
  background: rgba(255,255,255,0.025);
  overflow: hidden;
  transition: border-color 0.3s, background 0.3s;
}
.recent-card:hover {
  border-color: rgba(201,168,76,0.35);
  background: rgba(255,255,255,0.045);
}
.recent-body { padding: 1.5rem 1.6rem; }
.recent-title {
  font-family: var(--serif);
  font-size: 0.95rem;
  color: white;
  margin-bottom: 0.9rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.recent-item { padding: 0.7rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.recent-item:last-child { border-bottom: none; padding-bottom: 0; }
.recent-item-title {
  font-size: 0.8rem;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  margin-bottom: 0.2rem;
}
.recent-item-desc {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.38);
  line-height: 1.55;
}

/* ─── SECTION SCAFFOLDING ─────────────────────────────────────── */
.section {
  padding: 7rem 3rem;
  max-width: 1200px;
  margin: 0 auto;
}
.section-label {
  font-size: 0.68rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.section-label::before {
  content: '';
  display: block;
  width: 24px;
  height: 1px;
  background: var(--gold);
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  color: var(--text-dark);
  line-height: 1.15;
  margin-bottom: 3rem;
}
.section-title em { font-style: italic; color: var(--text-mid); }

/* Dark section variant */
.dark-section {
  background: var(--navy);
  padding: 7rem 3rem;
  position: relative;
  overflow: hidden;
}
.dark-section::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  opacity: 0.5;
}
.dark-section-inner {
  max-width: 1080px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}
.dark-section .section-label { color: var(--gold); }
.dark-section .section-label::before { background: var(--gold); }
.dark-section .section-title { color: white; }

/* ─── ABOUT ───────────────────────────────────────────────────── */
.about-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 5rem;
  align-items: start;
}
.about-aside {
  padding: 2rem;
  border: 1px solid var(--border);
  background: white;
  position: sticky;
  top: 100px;
}
.aside-heading {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid rgba(0,0,0,0.07);
}
.aside-item {
  display: flex;
  flex-direction: column;
  gap: 0.15rem;
  padding: 0.7rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  transition: padding-left 0.25s var(--ease);
}
.aside-item:last-child { border-bottom: none; }
.aside-item:hover { padding-left: 4px; }
.aside-label {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.aside-value {
  font-size: 0.875rem;
  color: var(--text-dark);
  font-weight: 500;
}
.about-text p {
  font-size: 1.02rem;
  color: var(--text-mid);
  margin-bottom: 1.4rem;
  line-height: 1.8;
}
.about-text p strong { color: var(--text-dark); font-weight: 600; }
.about-text p:last-child { margin-bottom: 0; }

/* ─── EXPERIENCE ──────────────────────────────────────────────── */
.exp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}
.exp-card {
  border: 1px solid rgba(201,168,76,0.14);
  background: rgba(255,255,255,0.03);
  overflow: hidden;
  transition: border-color 0.35s, background 0.35s, transform 0.35s var(--ease);
  will-change: transform;
}
.exp-card:hover {
  border-color: rgba(201,168,76,0.4);
  background: rgba(255,255,255,0.055);
  transform: translateY(-4px);
}
.exp-card-photo {
  height: 160px;
  overflow: hidden;
  background: rgba(201,168,76,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
}
.exp-card-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s var(--ease);
}
.exp-card:hover .exp-card-photo img { transform: scale(1.04); }
.exp-card-placeholder {
  height: 160px;
  background: rgba(201,168,76,0.04);
  border-bottom: 1px dashed rgba(201,168,76,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.15);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.exp-card-body { padding: 1.6rem 1.75rem 1.9rem; }
.exp-card-tag {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.75rem;
}
.exp-card-title {
  font-family: var(--serif);
  font-size: 1.15rem;
  color: white;
  margin-bottom: 0.3rem;
  line-height: 1.25;
}
.exp-card-org {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  margin-bottom: 1rem;
  font-style: italic;
}
.exp-card-desc {
  font-size: 0.84rem;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
}

/* ─── PRESS ───────────────────────────────────────────────────── */
.press-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
}
@media (max-width: 640px) {
  .press-grid { grid-template-columns: 1fr; }
}
.press-card {
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
  padding: 2rem 2rem 1.75rem;
  border: 1px solid rgba(201,168,76,0.14);
  background: rgba(255,255,255,0.03);
  transition: border-color 0.35s, background 0.35s, transform 0.35s var(--ease);
  will-change: transform;
}
.press-card:hover {
  border-color: rgba(201,168,76,0.4);
  background: rgba(255,255,255,0.055);
  transform: translateY(-3px);
}
.press-source {
  font-size: 0.62rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
}
.press-headline {
  font-family: var(--serif);
  font-size: 1.1rem;
  color: white;
  line-height: 1.35;
}
.press-arrow {
  margin-top: auto;
  padding-top: 0.75rem;
  font-size: 0.78rem;
  font-weight: 500;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: color 0.25s, gap 0.3s var(--ease-spring);
}
.press-arrow-icon {
  display: inline-block;
  transition: transform 0.3s var(--ease-spring);
}
.press-card:hover .press-arrow { color: var(--gold-light); gap: 0.8rem; }
.press-card:hover .press-arrow-icon { transform: translateX(3px); }

/* ─── CONTACT ─────────────────────────────────────────────────── */
.contact-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
  max-width: 1080px;
  margin: 0 auto;
  padding: 7rem 3rem;
}
.contact-left .section-title { margin-bottom: 1rem; }
.contact-body {
  font-size: 1rem;
  color: var(--text-mid);
  line-height: 1.8;
  margin-bottom: 2.25rem;
}
.contact-email {
  display: inline-flex;
  align-items: center;
  gap: 0.65rem;
  font-size: 0.85rem;
  font-weight: 500;
  color: white;
  padding: 0.95rem 1.65rem;
  background: var(--navy);
  border: 1px solid rgba(201,168,76,0.2);
  transition: background 0.3s, border-color 0.3s, gap 0.3s var(--ease-spring);
  margin-bottom: 1rem;
}
.contact-email:hover {
  background: var(--navy-mid);
  border-color: rgba(201,168,76,0.5);
  gap: 1rem;
}
.contact-links { display: flex; gap: 1rem; flex-wrap: wrap; }
.contact-link {
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  border-bottom: 1px solid transparent;
  padding-bottom: 2px;
  transition: color 0.25s, border-color 0.25s;
}
.contact-link:hover { color: var(--text-dark); border-color: var(--text-dark); }
.contact-right { display: flex; flex-direction: column; gap: 1rem; }
.contact-detail {
  padding: 1.4rem 1.6rem;
  border: 1px solid rgba(13,27,42,0.1);
  background: white;
  transition: border-color 0.25s, transform 0.3s var(--ease);
}
.contact-detail:hover {
  border-color: rgba(13,27,42,0.25);
  transform: translateX(4px);
}
.contact-detail-label {
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0.3rem;
}
.contact-detail-value {
  font-size: 0.9rem;
  color: var(--text-dark);
  font-weight: 500;
}

/* ─── FOOTER ──────────────────────────────────────────────────── */
footer {
  background: var(--navy);
  padding: 2.25rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(201,168,76,0.1);
}
.footer-name {
  font-family: var(--serif);
  color: var(--gold-light);
  font-size: 1rem;
}
.footer-note {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.03em;
}

/* ─── REVEAL ANIMATIONS ───────────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 0.75s var(--ease), transform 0.75s var(--ease);
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}
.reveal-left {
  opacity: 0;
  transform: translateX(-24px);
  transition: opacity 0.75s var(--ease), transform 0.75s var(--ease);
}
.reveal-left.visible {
  opacity: 1;
  transform: translateX(0);
}

/* ─── DIVIDER ─────────────────────────────────────────────────── */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

/* ─── RESPONSIVE ──────────────────────────────────────────────── */

/* Tablet — 960px */
@media (max-width: 960px) {
  .hero-grid { grid-template-columns: 1fr; gap: 3rem; }
  .about-layout { grid-template-columns: 1fr; }
  .about-aside { position: static; }
  .exp-grid { grid-template-columns: 1fr 1fr; }
  .contact-wrap { grid-template-columns: 1fr; gap: 3rem; }
  nav { padding: 1.1rem 2rem; }
  nav.scrolled { padding: 0.85rem 2rem; }
}

/* Mobile large — 640px */
@media (max-width: 640px) {
  nav { padding: 1rem 1.25rem; }
  nav.scrolled { padding: 0.8rem 1.25rem; }
  .nav-resume { padding: 0.4rem 0.85rem; font-size: 0.66rem; }

  .hero {
    min-height: 100svh; /* iOS viewport fix */
    min-height: 100vh;  /* fallback */
    padding: 7.5rem 1.25rem 3.5rem;
    align-items: flex-start;
  }
  .hero-name { font-size: clamp(2.6rem, 11vw, 3.6rem); }
  .hero-bullets li { font-size: 0.82rem; }
  .hero-cta { width: 100%; justify-content: center; padding: 1rem 1.5rem; }

  .section { padding: 4.5rem 1.25rem; }
  .dark-section { padding: 4.5rem 1.25rem; }
  .dark-section-inner { padding: 0; }
  .contact-wrap { padding: 4.5rem 1.25rem; }

  .about-text p { font-size: 0.96rem; }

  .exp-grid { grid-template-columns: 1fr; }
  .press-grid { grid-template-columns: 1fr; }

  .contact-email {
    width: 100%;
    justify-content: space-between;
    word-break: break-all;
  }
  .contact-detail-value { font-size: 0.82rem; word-break: break-all; }

  footer { flex-direction: column; gap: 0.5rem; text-align: center; padding: 1.75rem 1.25rem; }

  #cursor-dot, #cursor-ring { display: none; }
  body { cursor: auto; }
  a { cursor: auto; }
}

/* Mobile small — 390px */
@media (max-width: 390px) {
  .hero-name { font-size: clamp(2.3rem, 12vw, 3rem); }
  .section-title { font-size: clamp(1.7rem, 8vw, 2.2rem); }
  .exp-card-body { padding: 1.25rem 1.25rem 1.5rem; }
}

/* Touch devices — disable hover lift effects */
@media (hover: none) {
  .exp-card:hover { transform: none; }
  .press-card:hover { transform: none; }
  .contact-detail:hover { transform: none; }
  .aside-item:hover { padding-left: 0; }
}

/* Reduced motion — respect OS accessibility setting */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  .reveal, .reveal-left,
  .hero-name-inner,
  .hero-eyebrow-text,
  .hero-bullets li,
  .hero-cta,
  .hero-right,
  .nav-logo,
  .nav-resume {
    opacity: 1 !important;
    transform: none !important;
  }
  .hero-eyebrow-line { width: 32px; }
  #loader { display: none; }
}

</style>
</head>
<body>

<!-- CURSOR -->

<div id="cursor-ring"></div>

<!-- PROGRESS -->
<div id="progress-bar"></div>

<!-- LOADER -->
<div id="loader">
  <div id="loader-logo">Charlie Erker</div>
</div>

<!-- NAV -->
<nav id="nav">
  <a href="#" class="nav-logo" id="nav-logo">Charlie Erker</a>
  <a href="resume.pdf" class="nav-resume" id="nav-resume" target="_blank" rel="noopener">Resume ↗</a>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-grid">
    <div class="hero-left">
      <div class="hero-eyebrow">
        <span class="hero-eyebrow-line" id="eyebrow-line"></span>
        <span class="hero-eyebrow-text" id="eyebrow-text"></span>
      </div>

  <div class="about-layout">
    <div class="about-aside reveal-left" id="about-aside">
      <div class="aside-heading">Details</div>

  </div>

<div class="divider"></div>

<!-- EXPERIENCE -->
<div class="dark-section" id="experience">
  <div class="dark-section-inner">
    <div class="section-label reveal">Experience</div>
    <h2 class="section-title reveal">Where I've<br><em>Done the Work</em></h2>
    <div class="exp-grid" id="exp-grid"></div>
  </div>
</div>

<div class="dark-section" id="press">
  <div class="dark-section-inner">
    <div class="section-label reveal">Press</div>
    <h2 class="section-title reveal">In the<br><em>Coverage</em></h2>
    <div class="press-grid" id="press-grid"></div>
  </div>
</div>

<!-- CONTACT -->
<div class="contact-wrap" id="contact">
  <div class="contact-left reveal">
    <div class="section-label">Get in Touch</div>
    <h2 class="section-title" id="contact-heading"></h2>
    <p class="contact-body" id="contact-body"></p>
    <a class="contact-email" id="contact-email" href="#">
      <span id="contact-email-text"></span>
      <span>→</span>
    </a>

  </div>
  <div class="contact-right reveal" id="contact-right">

    </div>

<!-- FOOTER -->

<script>
/* ═══════════════════════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════════════════════ */
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
let ringX = 0, ringY = 0, dotX = 0, dotY = 0;
let raf;

document.addEventListener('mousemove', (e) => {
  dotX = e.clientX; dotY = e.clientY;
  dot.style.transform = `translate(calc(-50% + ${dotX}px), calc(-50% + ${dotY}px))`;
  if (!raf) raf = requestAnimationFrame(animRing);
});

function animRing() {
  ringX += (dotX - ringX) * 0.12;
  ringY += (dotY - ringY) * 0.12;
  ring.style.transform = `translate(calc(-50% + ${ringX}px), calc(-50% + ${ringY}px))`;
  raf = requestAnimationFrame(animRing);
}

document.querySelectorAll('a, button, [data-hover]').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

/* ═══════════════════════════════════════════════════════════
   SCROLL PROGRESS
═══════════════════════════════════════════════════════════ */
const progressBar = document.getElementById('progress-bar');
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  progressBar.style.width = (pct * 100) + '%';
}, { passive: true });

/* ═══════════════════════════════════════════════════════════
   NAV SCROLL
═══════════════════════════════════════════════════════════ */
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* ═══════════════════════════════════════════════════════════
   INTERSECTION OBSERVER
═══════════════════════════════════════════════════════════ */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach((entry, i) => {
    if (entry.isIntersecting) {
      // stagger siblings
      const siblings = entry.target.parentElement
        ? [...entry.target.parentElement.querySelectorAll('.reveal, .reveal-left')]
        : [];
      const idx = siblings.indexOf(entry.target);
      setTimeout(() => entry.target.classList.add('visible'), idx * 80);
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

function observeReveals() {
  document.querySelectorAll('.reveal, .reveal-left').forEach(el => revealObserver.observe(el));
}

/* ═══════════════════════════════════════════════════════════
   DATA → DOM
═══════════════════════════════════════════════════════════ */
async function loadData() {
  let data;
  try {
    const res = await fetch('data.json');
    data = await res.json();
  } catch(e) {
    console.warn('data.json not found, using fallback');
    data = window.__FALLBACK__;
  }
  renderAll(data);
}

function renderAll(d) {
  renderHero(d.hero);
  renderRecents(d.recents);
  renderAbout(d.about);
  renderExperience(d.experience);
  renderPress(d.press);
  renderContact(d.contact, d.about);
  renderFooter(d.footer);

  // after render, run reveal observer
  observeReveals();

  // hero stagger
  setTimeout(heroReveal, 100);
}

/* ─── HERO ──────────────────────────────────────────── */
function renderHero(h) {
  document.getElementById('eyebrow-text').textContent = h.eyebrow;
  document.getElementById('hero-cta').href = h.cta.file;
  document.getElementById('hero-cta').querySelector('span').textContent = h.cta.text;

  // Split name into lines
  const nameEl = document.getElementById('hero-name');
  h.name.forEach((part, i) => {
    const line = document.createElement('span');
    line.className = 'hero-name-line';
    const inner = document.createElement('span');
    inner.className = 'hero-name-inner';
    // Last word gets italic style
    inner.innerHTML = i === h.name.length - 1 ? `<em>${part}</em>` : part;
    line.appendChild(inner);
    nameEl.appendChild(line);
  });

  const ul = document.getElementById('hero-bullets');
  h.bullets.forEach((b, i) => {
    const li = document.createElement('li');
    li.style.transitionDelay = (0.85 + i * 0.1) + 's';
    li.innerHTML = `<span class="bullet-dot"></span>${b}`;
    ul.appendChild(li);
  });
}

function heroReveal() {
  // eyebrow
  document.getElementById('eyebrow-line').classList.add('expanded');
  setTimeout(() => document.getElementById('eyebrow-text').classList.add('visible'), 200);

  // name lines
  document.querySelectorAll('.hero-name-inner').forEach((el, i) => {
    setTimeout(() => el.classList.add('visible'), 400 + i * 120);
  });

  // bullets
  document.querySelectorAll('.hero-bullets li').forEach((li, i) => {
    setTimeout(() => li.classList.add('visible'), 700 + i * 100);
  });

  // cta
  setTimeout(() => document.getElementById('hero-cta').classList.add('visible'), 1050);

  // right panel
  setTimeout(() => document.getElementById('hero-right').classList.add('visible'), 900);

  // nav
  setTimeout(() => {
    document.getElementById('nav-logo').classList.add('nav-in');
    document.getElementById('nav-resume').classList.add('nav-in');
  }, 200);
}

/* ─── RECENTS ───────────────────────────────────────── */
function renderRecents(recents) {
  const container = document.getElementById('recents-container');
  recents.forEach(r => {
    const card = document.createElement('div');
    card.className = 'recent-card';
    let itemsHTML = r.items.map(item => `
      <div class="recent-item">
        <div class="recent-item-title">${item.title}</div>
        <div class="recent-item-desc">${item.description}</div>
      </div>
    `).join('');
    card.innerHTML = `
      <div class="recent-body">
        <div class="recent-title">${r.title}</div>
        ${itemsHTML}
      </div>
    `;
    container.appendChild(card);
  });
}

/* ─── ABOUT ─────────────────────────────────────────── */
function renderAbout(a) {
  const details = document.getElementById('about-details');
  a.details.forEach(d => {
    details.innerHTML += `
      <div class="aside-item">
        <span class="aside-label">${d.label}</span>
        <span class="aside-value">${d.value}</span>
      </div>
    `;
  });

  const text = document.getElementById('about-text');
  a.bio.forEach((p, i) => {
    const el = document.createElement('p');
    el.className = 'reveal';
    el.style.transitionDelay = (i * 0.1) + 's';
    el.innerHTML = p;
    text.appendChild(el);
  });
}

/* ─── EXPERIENCE ─────────────────────────────────────── */
function renderExperience(exp) {
  const grid = document.getElementById('exp-grid');
  exp.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'exp-card reveal';
    card.style.transitionDelay = (i * 0.1) + 's';
    const photo = e.image
      ? `<div class="exp-card-photo"><img src="${e.image}" alt="${e.title}" loading="lazy"></div>`
      : `<div class="exp-card-placeholder">Photo</div>`;
    card.innerHTML = `
      ${photo}
      <div class="exp-card-body">
        <div class="exp-card-tag">${e.tag}</div>
        <div class="exp-card-title">${e.title}</div>
        <div class="exp-card-org">${e.org}</div>
        <div class="exp-card-desc">${e.description}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ─── PRESS ──────────────────────────────────────────── */
function renderPress(press) {
  const grid = document.getElementById('press-grid');
  press.forEach((p, i) => {
    const card = document.createElement('a');
    card.className = 'press-card reveal';
    card.href = p.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    card.style.transitionDelay = (i * 0.12) + 's';
    card.innerHTML = `
      <div class="press-source">${p.source}</div>
      <div class="press-headline">${p.headline}</div>
      <div class="press-arrow">Read more <span class="press-arrow-icon">→</span></div>
    `;
    grid.appendChild(card);
  });
}

/* ─── CONTACT ────────────────────────────────────────── */
function renderContact(c, about) {
  document.getElementById('contact-heading').textContent = c.heading;
  document.getElementById('contact-body').textContent = c.body;

  const emailEl = document.getElementById('contact-email');
  emailEl.href = `mailto:${c.email}`;
  document.getElementById('contact-email-text').textContent = c.email;
  document.getElementById('contact-detail-email').textContent = c.email;

  const links = document.getElementById('contact-links');
  c.links.forEach(l => {
    links.innerHTML += `<a class="contact-link" href="${l.url}" target="_blank" rel="noopener">${l.label} ↗</a>`;
  });

  // populate detail cards from about
  const loc = about.details.find(d => d.label === 'Location');
