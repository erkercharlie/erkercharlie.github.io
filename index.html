<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charlie Erker</title>
<meta name="description" content="Charlie Erker — Mechanical Engineering & Business, University of Kansas. Building at the intersection of engineering and strategy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>

/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --navy:   #0d1b2a;
  --navy-2: #162234;
  --gold:   #c9a84c;
  --gold-l: #e8c97a;
  --cream:  #faf8f3;
  --cream-2:#f0ede5;
  --ink:    #0d1b2a;
  --ink-2:  #3a4a5c;
  --ink-3:  #7a8a9a;
  --serif:  'DM Serif Display', Georgia, serif;
  --sans:   'DM Sans', system-ui, sans-serif;
  --ease:   cubic-bezier(0.25, 1, 0.5, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ─── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  line-height: 1.6;
  overflow-x: hidden;
  cursor: none;
}
a { color: inherit; text-decoration: none; cursor: none; }
img { display: block; max-width: 100%; }

/* ─── CURSOR ──────────────────────────────────────────────── */
#cur-dot, #cur-ring {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  will-change: transform;
  border-radius: 50%;
}
#cur-dot {
  width: 5px; height: 5px;
  background: var(--gold);
  z-index: 10000;
  transition: width .15s var(--ease), height .15s var(--ease), background .2s;
}
#cur-ring {
  width: 34px; height: 34px;
  border: 1px solid rgba(201,168,76,.45);
  transition: width .3s var(--ease), height .3s var(--ease), border-color .3s, background .3s;
}
body.ch #cur-dot  { width: 9px; height: 9px; }
body.ch #cur-ring { width: 54px; height: 54px; border-color: rgba(201,168,76,.85); background: rgba(201,168,76,.04); }
body.cd #cur-dot  { background: var(--navy); }
body.cd #cur-ring { border-color: rgba(13,27,42,.35); }

/* ─── PROGRESS ────────────────────────────────────────────── */
#progress {
  position: fixed;
  top: 0; left: 0;
  height: 2px; width: 0;
  background: linear-gradient(90deg, var(--gold), var(--gold-l));
  z-index: 300;
  transition: width .05s linear;
}

/* ─── LOADER ──────────────────────────────────────────────── */
#loader {
  position: fixed; inset: 0;
  background: var(--navy);
  z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .75s var(--ease), visibility .75s;
}
#loader.out { opacity: 0; visibility: hidden; }
#loader-inner { text-align: center; }
#loader-initials {
  font-family: var(--serif);
  font-size: 3.5rem;
  color: var(--gold-l);
  letter-spacing: .3em;
  opacity: 0;
  transform: translateY(18px);
  animation: ldrUp .6s var(--ease) .2s forwards;
}
#loader-line {
  height: 1px;
  background: var(--gold);
  width: 0;
  margin: .8rem auto 0;
  animation: ldrLine .65s var(--ease) .6s forwards;
}
@keyframes ldrUp  { to { opacity: 1; transform: translateY(0); } }
@keyframes ldrLine{ to { width: 56px; } }

/* ─── NAV ─────────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.6rem 3rem;
  transition: background .4s var(--ease), border-color .4s, padding .4s, transform .45s var(--ease);
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(13,27,42,.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-color: rgba(201,168,76,.1);
  padding: 1rem 3rem;
}
nav.hide { transform: translateY(-100%); }
.nav-logo {
  font-family: var(--serif);
  font-size: 1.05rem;
  color: var(--gold-l);
  letter-spacing: .05em;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity .35s, transform .35s, color .25s;
}
.nav-logo:hover { color: #fff; }
.nav-cta {
  font-size: .68rem;
  font-weight: 500;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: rgba(255,255,255,.92);
  border: 1px solid rgba(255,255,255,.75);
  padding: .5rem 1.2rem;
  opacity: 0;
  transform: translateY(-6px);
  transition: color .25s, border-color .25s, background .25s;
}
.nav-cta:hover { color: var(--gold-l); border-color: var(--gold); background: rgba(201,168,76,.06); }
.nav-in { opacity: 1 !important; transform: translateY(0) !important; }

/* ─── HERO ────────────────────────────────────────────────── */
.hero {
  min-height: 100svh;
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 3rem 3.5rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 65% 55% at 78% 18%, rgba(201,168,76,.065) 0%, transparent 65%),
    radial-gradient(ellipse 40% 55% at 12% 82%, rgba(201,168,76,.04) 0%, transparent 60%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; opacity: .55;
}

/* top-right corner: headshot + status */
.hero-corner {
  position: absolute;
  top: 5.5rem; right: 3rem;
  text-align: right;
  z-index: 1;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity .65s var(--ease) 1.0s, transform .65s var(--ease) 1.0s;
}
.hero-corner.vis { opacity: 1; transform: translateY(0); }
.hero-photo {
  width: 148px;
  height: 200px;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,.2);
  margin-left: auto;
  margin-bottom: .9rem;
}
.hero-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
  filter: grayscale(10%);
  transition: transform .6s var(--ease);
}
.hero-corner:hover .hero-photo img { transform: scale(1.04); }
.hero-status-label {
  font-size: .57rem;
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: rgba(255,255,255,.24);
  margin-bottom: .25rem;
}
.hero-status-value {
  font-family: var(--serif);
  font-size: .88rem;
  color: rgba(255,255,255,.58);
  font-style: italic;
}

/* name */
.hero-name {
  position: relative; z-index: 1;
  margin-bottom: 3.5rem;
}
.hero-name-line {
  display: block;
  overflow: hidden;
  line-height: .88;
}
.hero-name-inner {
  display: block;
  font-family: var(--serif);
  font-size: clamp(5.5rem, 14.5vw, 13rem);
  color: #fff;
  letter-spacing: -.02em;
  transform: translateY(108%);
  transition: transform .95s var(--ease);
}
.hero-name-inner.vis { transform: translateY(0); }
.hero-name-inner.gold-italic { font-style: italic; color: var(--gold-l); }

/* bottom bar */
/* ─── HERO RECENT CARD ───────────────────────────────────────── */
.hero-recent {
  position: absolute;
  top: 27rem; right: 3rem;
  width: 230px;
  background: #fdf8e1;
  padding: 1.35rem 1.25rem 1.25rem;
  z-index: 2;
  opacity: 0;
  transform: translateY(10px) rotate(1.5deg);
  transition: opacity .65s var(--ease) 1.3s, transform .65s var(--ease) 1.3s;
  box-shadow: 3px 6px 22px rgba(0,0,0,.28), 0 1px 3px rgba(0,0,0,.18);
}
.hero-recent::before {
  content: '';
  position: absolute;
  top: -10px; left: 50%;
  transform: translateX(-50%);
  width: 48px; height: 20px;
  background: rgba(201,168,76,.55);
  box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.hero-recent.vis { opacity: 1; transform: translateY(0) rotate(1.5deg); }
.hero-recent:hover { transform: translateY(-2px) rotate(.5deg); transition: transform .25s var(--ease); }
.hero-recent-label {
  font-size: .52rem;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .65rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.hero-recent-label::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .4; transform: scale(.7); }
}
.hero-recent-title {
  font-family: var(--serif);
  font-size: .95rem;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: .35rem;
}
.hero-recent-desc {
  font-size: .68rem;
  color: var(--ink-2);
  line-height: 1.65;
}
.hero-recent-link {
  display: inline-block;
  margin-top: .7rem;
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  border-bottom: 1px solid rgba(201,168,76,.3);
  padding-bottom: 1px;
  transition: border-color .2s;
}
.hero-recent-link:hover { border-color: var(--gold); }

.hero-bottom {
  position: relative; z-index: 1;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 2rem;
}
.hero-left-info { max-width: 460px; }
.hero-eyebrow {
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .7rem;
  display: flex; align-items: center; gap: .75rem;
  opacity: 0; transform: translateY(8px);
  transition: opacity .5s var(--ease) .45s, transform .5s var(--ease) .45s;
}
.hero-eyebrow.vis { opacity: 1; transform: translateY(0); }
.eyebrow-line {
  display: block; width: 0; height: 1px;
  background: var(--gold);
  transition: width .75s var(--ease) .65s;
}
.eyebrow-line.exp { width: 28px; }
.hero-sub {
  font-size: clamp(.88rem, 1.4vw, 1rem);
  color: rgba(255,255,255,.4);
  line-height: 1.65;
  opacity: 0; transform: translateY(8px);
  transition: opacity .5s var(--ease) .65s, transform .5s var(--ease) .65s;
}
.hero-sub.vis { opacity: 1; transform: translateY(0); }

.hero-scroll {
  display: flex; flex-direction: column; align-items: center; gap: .55rem;
  opacity: 0;
  transition: opacity .5s var(--ease) 1.2s;
  flex-shrink: 0;
}
.hero-scroll.vis { opacity: 1; }
.hero-scroll-label {
  font-size: .56rem;
  font-weight: 600;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(255,255,255,.28);
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}
.hero-scroll-bar {
  width: 1px; height: 44px;
  background: linear-gradient(to bottom, var(--gold), transparent);
  animation: pulse 2.2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: .35; transform: scaleY(1); transform-origin: top; }
  50%      { opacity: .85; transform: scaleY(1.1); transform-origin: top; }
}

/* ─── MARQUEE ─────────────────────────────────────────────── */
.marquee {
  background: var(--navy);
  border-top: 1px solid rgba(201,168,76,.1);
  border-bottom: 1px solid rgba(201,168,76,.1);
  overflow: hidden;
  padding: 1.05rem 0;
}
.marquee-track {
  display: flex;
  width: max-content;
  animation: ticker 26s linear infinite;
}
.marquee-track:hover { animation-play-state: paused; }
.marquee-item {
  display: flex; align-items: center; gap: 1.6rem;
  padding: 0 1.6rem;
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: rgba(255,255,255,.25);
  white-space: nowrap;
}
.marquee-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}
@keyframes ticker {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}

/* ─── SECTION COMMONS ─────────────────────────────────────── */
.sec-label {
  font-size: .62rem;
  font-weight: 600;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .9rem;
  display: flex; align-items: center; gap: .7rem;
}
.sec-label::before {
  content: '';
  display: block; width: 20px; height: 1px;
  background: var(--gold);
}
.sec-title {
  font-family: var(--serif);
  font-size: clamp(2.4rem, 4.5vw, 4rem);
  line-height: 1.07;
  margin-bottom: 3.5rem;
}
.sec-title em { font-style: italic; }

/* ─── ABOUT ───────────────────────────────────────────────── */
.about {
  background: var(--cream);
  padding: 9rem 3rem;
}
.about-inner { max-width: 1140px; margin: 0 auto; }
.about-header { margin-bottom: 5rem; }
.about-header .sec-title { color: var(--ink); margin-bottom: 0; }
.about-header .sec-title em { color: var(--ink-2); }

.about-body {
  display: grid;
  grid-template-columns: 210px 1fr;
  gap: 7rem;
  align-items: start;
}

.about-stats {
  display: flex;
  flex-direction: column;
  gap: 2.75rem;
  position: sticky;
  top: 110px;
}
.stat {
  border-left: 2px solid var(--gold);
  padding-left: 1.2rem;
}
.stat-val {
  font-family: var(--serif);
  font-size: clamp(2.6rem, 4.2vw, 3.8rem);
  color: var(--ink);
  line-height: .95;
  margin-bottom: .4rem;
}
.stat-lbl {
  font-size: .6rem;
  font-weight: 600;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--ink-3);
  line-height: 1.5;
}

.about-content {}
.about-bio p {
  font-size: 1.06rem;
  color: var(--ink-2);
  line-height: 1.84;
  margin-bottom: 1.5rem;
}
.about-bio p strong { color: var(--ink); font-weight: 600; }
.about-bio p:last-of-type { margin-bottom: 2.75rem; }

.details-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: .85rem 2.5rem;
  padding-top: 2.5rem;
  border-top: 1px solid rgba(0,0,0,.09);
}
.detail { }
.detail-lbl {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: .2rem;
}
.detail-val {
  font-size: .875rem;
  font-weight: 500;
  color: var(--ink);
}

/* ─── EXPERIENCE ──────────────────────────────────────────── */
.exp {
  background: var(--navy);
  padding: 9rem 0 9rem 3rem;
  overflow: hidden;
}
.exp-head {
  max-width: calc(1140px + 3rem);
  margin: 0 auto 3.5rem;
  padding-right: 3rem;
}
.exp .sec-label { color: var(--gold); }
.exp .sec-title { color: white; margin-bottom: 0; }
.exp .sec-title em { color: var(--gold-l); }

.exp-track {
  display: flex;
  gap: 1.5rem;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-right: 3rem;
  scrollbar-width: none;
  cursor: grab;
}
.exp-track::-webkit-scrollbar { display: none; }
.exp-track.drag { cursor: grabbing; scroll-snap-type: none; user-select: none; }

.exp-card {
  flex-shrink: 0;
  width: clamp(290px, 36vw, 460px);
  scroll-snap-align: start;
  background: rgba(255,255,255,.028);
  border: 1px solid rgba(201,168,76,.12);
  padding: 0;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color .35s, background .35s, transform .35s var(--ease);
  will-change: transform;
}
.exp-card:hover {
  border-color: rgba(201,168,76,.38);
  background: rgba(255,255,255,.052);
  transform: translateY(-5px);
}
.exp-card-img {
  width: 100%;
  height: 260px;
  overflow: hidden;
  flex-shrink: 0;
}
.exp-card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 25%;
  display: block;
  filter: grayscale(8%);
  transition: transform .6s var(--ease);
}
.exp-card:hover .exp-card-img img { transform: scale(1.05); }
.exp-card-body {
  padding: 2.5rem 2.25rem 2.75rem;
  flex: 1;
  display: flex;
  flex-direction: column;
}
.exp-num {
  font-family: var(--serif);
  font-size: 3.8rem;
  font-style: italic;
  color: rgba(201,168,76,.1);
  line-height: 1;
  margin-bottom: 2.25rem;
}
.exp-tag {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .9rem;
}
.exp-title {
  font-family: var(--serif);
  font-size: 1.4rem;
  color: white;
  line-height: 1.2;
  margin-bottom: .4rem;
}
.exp-org {
  font-size: .75rem;
  color: rgba(255,255,255,.28);
  font-style: italic;
  margin-bottom: 1.6rem;
  padding-bottom: 1.6rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.exp-desc {
  font-size: .86rem;
  color: rgba(255,255,255,.48);
  line-height: 1.74;
  flex: 1;
}

.exp-footer {
  max-width: calc(1140px + 3rem);
  margin: 2.25rem auto 0;
  padding-right: 3rem;
}
.exp-hint {
  font-size: .6rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: rgba(255,255,255,.18);
  display: flex; align-items: center; gap: .65rem;
}
.exp-hint-arr {
  display: inline-block;
  animation: nudge 2.4s ease-in-out infinite;
}
@keyframes nudge {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(6px); }
}

/* ─── PROJECTS ────────────────────────────────────────────── */
.projects {
  background: var(--cream-2);
  padding: 9rem 3rem;
}
.projects-inner { max-width: 1140px; margin: 0 auto; }
.projects .sec-title { color: var(--ink); }
.projects .sec-title em { color: var(--ink-2); }

.projects-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2.5rem;
}
.project-card {
  border-left: 2px solid var(--gold);
  padding-left: 1.5rem;
  display: flex;
  flex-direction: column;
  transition: padding-left .3s var(--ease);
}
.project-card:hover { padding-left: 2.25rem; }
.project-tag {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: .65rem;
}
.project-title {
  font-family: var(--serif);
  font-size: 1.25rem;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: .35rem;
}
.project-org {
  font-size: .72rem;
  color: var(--ink-3);
  font-style: italic;
  margin-bottom: 1rem;
}
.project-desc {
  font-size: .875rem;
  color: var(--ink-2);
  line-height: 1.75;
}

/* ─── RECOGNITION ─────────────────────────────────────────── */
.recog {
  background: var(--cream);
  padding: 9rem 3rem;
}
.recog-inner { max-width: 1140px; margin: 0 auto; }
.recog .sec-title { color: var(--ink); }
.recog .sec-title em { color: var(--ink-2); }

.recog-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: rgba(0,0,0,.09);
  border: 1px solid rgba(0,0,0,.09);
  overflow: hidden;
}
.recog-card {
  background: var(--cream);
  padding: 0;
  display: flex;
  flex-direction: column;
  transition: background .3s;
  position: relative;
  overflow: hidden;
}
.recog-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px; height: 0;
  background: var(--gold);
  transition: height .45s var(--ease);
  z-index: 1;
}
.recog-card:hover { background: #fff; }
.recog-card:hover::after { height: 100%; }
.recog-img {
  width: 100%;
  height: 200px;
  overflow: hidden;
  flex-shrink: 0;
}
.recog-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 25%;
  display: block;
  filter: grayscale(8%);
  transition: transform .5s var(--ease);
}
.recog-card:hover .recog-img img { transform: scale(1.04); }
.recog-body {
  padding: 2.25rem 2.5rem 2.5rem;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .8rem;
}
.recog-source {
  font-size: .58rem;
  font-weight: 600;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--gold);
}
.recog-headline {
  font-family: var(--serif);
  font-size: clamp(1.05rem, 2vw, 1.35rem);
  color: var(--ink);
  line-height: 1.32;
}
.recog-link {
  margin-top: auto;
  font-size: .7rem;
  font-weight: 500;
  color: var(--ink-3);
  display: flex; align-items: center; gap: .45rem;
  transition: color .25s, gap .3s var(--spring);
}
.recog-link-arr { display: inline-block; transition: transform .3s var(--spring); }
.recog-card:hover .recog-link { color: var(--ink); gap: .75rem; }
.recog-card:hover .recog-link-arr { transform: translateX(3px); }

/* ─── CONTACT ─────────────────────────────────────────────── */
.contact {
  background: var(--navy);
  min-height: 100svh;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 8rem 3rem;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.contact::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,168,76,.055) 0%, transparent 70%);
  pointer-events: none;
}
.contact::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
}
.contact-inner {
  position: relative; z-index: 1;
  max-width: 900px; width: 100%;
}
.contact-heading {
  font-family: var(--serif);
  font-size: clamp(3.8rem, 10vw, 9rem);
  color: white;
  line-height: .92;
  margin-bottom: 2.25rem;
  letter-spacing: -.02em;
}
.contact-heading em { font-style: italic; color: var(--gold-l); display: block; }
.contact-body {
  font-size: 1rem;
  color: rgba(255,255,255,.42);
  max-width: 460px;
  margin: 0 auto 3rem;
  line-height: 1.78;
}
.contact-btn {
  display: inline-flex;
  align-items: center;
  gap: .9rem;
  padding: 1.1rem 2.4rem;
  border: 1px solid var(--gold);
  color: var(--gold-l);
  font-size: .8rem;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 2.75rem;
  position: relative;
  overflow: hidden;
  transition: color .3s;
}
.contact-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .45s var(--ease);
}
.contact-btn:hover::before { transform: scaleX(1); }
.contact-btn:hover { color: var(--navy); }
.contact-btn span, .contact-btn-arr { position: relative; z-index: 1; }
.contact-btn-arr { transition: transform .3s var(--spring); }
.contact-btn:hover .contact-btn-arr { transform: translateX(5px); }

.contact-btns {
  display: flex; flex-direction: column; align-items: center;
  gap: 1.1rem;
}

/* ─── FOOTER ──────────────────────────────────────────────── */
footer {
  background: var(--navy);
  border-top: 1px solid rgba(201,168,76,.1);
  padding: 2rem 3rem;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-name { font-family: var(--serif); color: var(--gold-l); font-size: .95rem; }
.footer-note { font-size: .67rem; color: rgba(255,255,255,.2); letter-spacing: .04em; }

/* ─── REVEAL ──────────────────────────────────────────────── */
.reveal {
  opacity: 0;
  transform: translateY(26px);
  transition: opacity .75s var(--ease), transform .75s var(--ease);
}
.reveal.vis { opacity: 1; transform: translateY(0); }
.reveal-up {
  opacity: 0;
  transform: translateY(14px);
  transition: opacity .6s var(--ease), transform .6s var(--ease);
}
.reveal-up.vis { opacity: 1; transform: translateY(0); }

/* ─── RESPONSIVE ──────────────────────────────────────────── */
@media (max-width: 960px) {
  nav { padding: 1.3rem 2rem; }
  nav.scrolled { padding: .95rem 2rem; }

  .hero { padding: 0 2rem 3rem; }
  .hero-corner { right: 2rem; }

  .about { padding: 7rem 2rem; }
  .about-body { grid-template-columns: 1fr; gap: 3.5rem; }
  .about-stats { flex-direction: row; flex-wrap: wrap; gap: 2rem; position: static; }
  .stat { flex: 1; min-width: 120px; }

  .exp { padding: 7rem 0 7rem 2rem; }
  .exp-card { width: clamp(270px, 68vw, 420px); }

  .projects { padding: 7rem 2rem; }
  .projects-grid { gap: 2rem; }
  .recog { padding: 7rem 2rem; }

  .contact { padding: 7rem 2rem; }
  footer { padding: 1.75rem 2rem; }
}

@media (max-width: 640px) {
  nav { padding: 1rem 1.25rem; }
  nav.scrolled { padding: .8rem 1.25rem; }
  .nav-cta { padding: .4rem .85rem; font-size: .63rem; }

  .hero { padding: 0 1.25rem 2.25rem; }
  .hero-corner { display: none; }
  .hero-name-inner { font-size: clamp(4.2rem, 17vw, 7rem); }
  .hero-bottom { flex-direction: column-reverse; align-items: flex-start; gap: 1.5rem; }
  .hero-recent {
    position: static;
    transform: rotate(1.5deg) !important;
    width: auto;
    margin: 1.75rem 0 0;
    align-self: flex-start;
  }
  .hero-recent.vis { transform: rotate(1.5deg) !important; }
  .hero-scroll { flex-direction: row; gap: .75rem; }
  .hero-scroll-label { writing-mode: horizontal-tb; transform: none; }
  .hero-scroll-bar { width: 28px; height: 1px; animation: none; opacity: .5; }

  .about { padding: 5.5rem 1.25rem; }
  .about-stats { gap: 1.5rem; }
  .stat-val { font-size: clamp(2.1rem, 9vw, 3rem); }
  .details-grid { grid-template-columns: 1fr; gap: .75rem; }

  .exp { padding: 5.5rem 0 5.5rem 1.25rem; }
  .exp-head { padding-right: 1.25rem; }
  .exp-card { width: clamp(260px, 83vw, 360px); }
  .exp-footer { display: none; }

  .projects { padding: 5.5rem 1.25rem; }
  .projects-grid { grid-template-columns: 1fr; gap: 2rem; }
  .recog { padding: 5.5rem 1.25rem; }
  .recog-grid { grid-template-columns: 1fr; }
  .recog-card { padding: 2rem 1.75rem; }

  .contact { padding: 5.5rem 1.25rem; }
  .contact-heading { font-size: clamp(3.2rem, 15vw, 5.5rem); }
  .contact-btn { width: 100%; justify-content: space-between; }
  .contact-links { flex-direction: column; gap: 1.1rem; }

  footer { flex-direction: column; gap: .5rem; text-align: center; padding: 1.5rem 1.25rem; }

  #cur-dot, #cur-ring { display: none; }
  body { cursor: auto; }
  a { cursor: auto; }
}

@media (max-width: 390px) {
  .hero-name-inner { font-size: clamp(3.5rem, 14.5vw, 5.5rem); }
  .about { padding: 4.5rem 1.25rem; }
  .exp { padding: 4.5rem 0 4.5rem 1.25rem; }
  .recog { padding: 4.5rem 1.25rem; }
  .contact { padding: 4.5rem 1.25rem; }
}

@media (hover: none) {
  .exp-card:hover { transform: none; }
  .recog-card:hover { background: var(--cream); }
  .recog-card:hover::after { height: 0; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    transition-duration: .01ms !important;
  }
  .reveal, .reveal-up,
  .hero-name-inner, .hero-eyebrow, .hero-sub,
  .hero-scroll, .hero-status, .nav-logo, .nav-cta {
    opacity: 1 !important;
    transform: none !important;
  }
  .eyebrow-line { width: 28px; }
  #loader { display: none; }
  .marquee-track { animation: none; }
}

</style>
</head>
<body>

<div id="cur-dot"></div>
<div id="cur-ring"></div>
<div id="progress"></div>

<!-- LOADER -->
<div id="loader">
  <div id="loader-inner">
    <div id="loader-initials">CE</div>
    <div id="loader-line"></div>
  </div>
</div>

<!-- NAV -->
<nav id="nav">
  <a href="#" class="nav-logo" id="nav-logo">Charlie Erker</a>
  <a href="resume.pdf" class="nav-cta" id="nav-cta" target="_blank" rel="noopener">Resume ↗</a>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-corner" id="hero-corner">
    <div class="hero-photo" id="hero-photo"></div>
    <div class="hero-status-label">Currently at</div>
    <div class="hero-status-value" id="hero-status-val"></div>
  </div>

  <div class="hero-name" id="hero-name"></div>

  <div class="hero-bottom">
    <div class="hero-left-info">
      <div class="hero-eyebrow" id="hero-eyebrow">
        <span class="eyebrow-line" id="eyebrow-line"></span>
        <span id="eyebrow-text"></span>
      </div>
      <p class="hero-sub" id="hero-sub"></p>
    </div>
    <div class="hero-scroll" id="hero-scroll">
      <span class="hero-scroll-label">Scroll</span>
      <span class="hero-scroll-bar"></span>
    </div>
  </div>
  <div class="hero-recent" id="hero-recent"></div>
</section>

<!-- MARQUEE -->
<div class="marquee">
  <div class="marquee-track" id="marquee-track"></div>
</div>

<!-- ABOUT -->
<section class="about" id="about">
  <div class="about-inner">
    <div class="about-header reveal">
      <div class="sec-label">About</div>
      <h2 class="sec-title">Engineer.<br><em>Builder. Thinker.</em></h2>
    </div>
    <div class="about-body">
      <div class="about-stats reveal" id="about-stats"></div>
      <div class="about-content">
        <div class="about-bio" id="about-bio"></div>
        <div class="details-grid reveal" id="about-details"></div>
      </div>
    </div>
  </div>
</section>

<!-- EXPERIENCE -->
<section class="exp" id="experience">
  <div class="exp-head">
    <div class="sec-label reveal">Experience</div>
    <h2 class="sec-title reveal">Where I've<br><em>Done the Work</em></h2>
  </div>
  <div class="exp-track" id="exp-track"></div>
  <div class="exp-footer">
    <div class="exp-hint reveal">
      Drag to explore <span class="exp-hint-arr">→</span>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section class="projects" id="projects">
  <div class="projects-inner">
    <div class="sec-label reveal">Projects & Leadership</div>
    <h2 class="sec-title reveal">What I've<br><em>Built & Led</em></h2>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</section>

<!-- RECOGNITION -->
<section class="recog" id="press">
  <div class="recog-inner">
    <div class="sec-label reveal">Recognition</div>
    <h2 class="sec-title reveal">In the<br><em>Room</em></h2>
    <div class="recog-grid" id="recog-grid"></div>
  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="contact">
  <div class="contact-inner">
    <h2 class="contact-heading reveal" id="contact-heading"></h2>
    <p class="contact-body reveal" id="contact-body"></p>
    <div class="contact-btns reveal" id="contact-btns"></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-name" id="footer-name"></div>
  <div class="footer-note" id="footer-note"></div>
</footer>

<script>

/* ── CURSOR ─────────────────────────────────────────────────── */
const dot  = document.getElementById('cur-dot');
const ring = document.getElementById('cur-ring');
let rx = 0, ry = 0, dx = 0, dy = 0, raf;

document.addEventListener('mousemove', e => {
  dx = e.clientX; dy = e.clientY;
  dot.style.transform  = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  if (!raf) raf = requestAnimationFrame(animRing);
});
function animRing() {
  rx += (dx - rx) * .115;
  ry += (dy - ry) * .115;
  ring.style.transform = `translate(calc(-50% + ${rx}px), calc(-50% + ${ry}px))`;
  raf = requestAnimationFrame(animRing);
}
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('ch'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('ch'));
});

/* ── PROGRESS BAR ───────────────────────────────────────────── */
const progBar = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight);
  progBar.style.width = (pct * 100) + '%';
}, { passive: true });

/* ── NAV — scroll + direction-aware hide ────────────────────── */
const nav = document.getElementById('nav');
let lastY = 0;
window.addEventListener('scroll', () => {
  const y = window.scrollY;
  nav.classList.toggle('scrolled', y > 60);
  if (y > 130) {
    nav.classList.toggle('hide', y > lastY + 4);
  } else {
    nav.classList.remove('hide');
  }
  lastY = y;
}, { passive: true });

/* ── REVEAL OBSERVER ────────────────────────────────────────── */
const revObs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (!entry.isIntersecting) return;
    const siblings = [...(entry.target.parentElement
      ? entry.target.parentElement.querySelectorAll('.reveal, .reveal-up')
      : [])];
    const idx = siblings.indexOf(entry.target);
    setTimeout(() => entry.target.classList.add('vis'), idx * 90);
    revObs.unobserve(entry.target);
  });
}, { threshold: 0.1, rootMargin: '0px 0px -36px 0px' });

function watchReveals() {
  document.querySelectorAll('.reveal, .reveal-up').forEach(el => revObs.observe(el));
}

/* ── DRAG-TO-SCROLL (experience track) ──────────────────────── */
function initDrag(el) {
  let down = false, startX, startScroll;
  el.addEventListener('mousedown', e => {
    down = true; el.classList.add('drag');
    startX = e.pageX - el.offsetLeft;
    startScroll = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { down = false; el.classList.remove('drag'); });
  el.addEventListener('mouseup',    () => { down = false; el.classList.remove('drag'); });
  el.addEventListener('mousemove', e => {
    if (!down) return;
    e.preventDefault();
    el.scrollLeft = startScroll - (e.pageX - el.offsetLeft - startX) * 1.5;
  });
}

/* ── MAGNETIC BUTTONS ───────────────────────────────────────── */
function initMagnetic() {
  document.querySelectorAll('.magnetic').forEach(btn => {
    btn.addEventListener('mousemove', e => {
      const r = btn.getBoundingClientRect();
      const x = e.clientX - r.left - r.width  / 2;
      const y = e.clientY - r.top  - r.height / 2;
      btn.style.transform = `translate(${x * .2}px, ${y * .2}px)`;
    });
    btn.addEventListener('mouseleave', () => btn.style.transform = '');
  });
}

/* ── CURSOR: dark on light sections ────────────────────────── */
const lightSecs = document.querySelectorAll('.about, .recog');
const darkObs = new IntersectionObserver(entries => {
  entries.forEach(e => document.body.classList.toggle('cd', e.isIntersecting));
}, { threshold: 0.35 });
lightSecs.forEach(s => darkObs.observe(s));

/* ══════════════════════════════════════════════════════════════
   DATA → DOM
══════════════════════════════════════════════════════════════ */
async function loadData() {
  let d;
  try { d = await fetch('data.json').then(r => r.json()); }
  catch(e) { console.warn('data.json missing'); return; }
  render(d);
}

function renderHeroRecent(r) {
  if (!r) return;
  const el = document.getElementById('hero-recent');
  el.innerHTML = `
    <div class="hero-recent-label">Recent</div>
    <div class="hero-recent-title">${r.title}</div>
    <div class="hero-recent-desc">${r.description}</div>
    ${r.link ? `<a class="hero-recent-link" href="${r.link}" target="_blank" rel="noopener">${r.linkLabel || 'Read more'} ↗</a>` : ''}`;
}

function render(d) {
  renderHero(d.hero, d.experience);
  renderHeroRecent(d.heroRecent);
  renderMarquee();
  renderAbout(d.about);
  renderExp(d.experience);
  renderProjects(d.projects);
  renderRecog(d.press);
  renderContact(d.contact);
  renderFooter(d.footer);
  watchReveals();
  setTimeout(heroReveal, 100);
  initDrag(document.getElementById('exp-track'));
  initMagnetic();
}

/* HERO */
function renderHero(h, exp) {
  document.getElementById('eyebrow-text').textContent = h.eyebrow;

  const nameEl = document.getElementById('hero-name');
  h.name.forEach((part, i) => {
    const line  = document.createElement('span');
    line.className = 'hero-name-line';
    const inner = document.createElement('span');
    inner.className = 'hero-name-inner' + (i === h.name.length - 1 ? ' gold-italic' : '');
    inner.textContent = part;
    line.appendChild(inner);
    nameEl.appendChild(line);
  });

  // subtitle — first bullet
  if (h.bullets && h.bullets[0]) {
    document.getElementById('hero-sub').textContent = h.bullets[0];
  }

  // headshot
  if (h.photo) {
    document.getElementById('hero-photo').innerHTML =
      `<img src="${h.photo}" alt="Charlie Erker">`;
  } else {
    document.getElementById('hero-photo').style.display = 'none';
  }

  // status — pull org name from experience[0]
  if (exp && exp[0]) {
    const parts = exp[0].org.split(' · ');
    document.getElementById('hero-status-val').textContent = parts[0];
  }
}

function heroReveal() {
  // eyebrow
  setTimeout(() => document.getElementById('eyebrow-line').classList.add('exp'), 300);
  setTimeout(() => document.getElementById('hero-eyebrow').classList.add('vis'), 380);
  setTimeout(() => document.getElementById('hero-sub').classList.add('vis'), 540);

  // name lines
  document.querySelectorAll('.hero-name-inner').forEach((el, i) => {
    setTimeout(() => el.classList.add('vis'), 120 + i * 140);
  });

  // auxiliary
  setTimeout(() => document.getElementById('hero-corner').classList.add('vis'), 950);
  setTimeout(() => document.getElementById('hero-scroll').classList.add('vis'), 1150);
  setTimeout(() => { const r = document.getElementById('hero-recent'); if (r) r.classList.add('vis'); }, 1400);

  // nav
  setTimeout(() => {
    document.getElementById('nav-logo').classList.add('nav-in');
    document.getElementById('nav-cta').classList.add('nav-in');
  }, 80);
}

/* MARQUEE */
function renderMarquee() {
  const words = [
    'Engineering', 'Strategy', 'Operations',
    'Product Development', 'Leadership', 'Case Competition',
    'Siemens', 'University of Kansas'
  ];
  const track = document.getElementById('marquee-track');
  [words, words].flat().forEach(w => {
    const s = document.createElement('span');
    s.className = 'marquee-item';
    s.innerHTML = `${w}<span class="marquee-dot"></span>`;
    track.appendChild(s);
  });
}

/* ABOUT */
function renderAbout(a) {
  // stats
  const statsEl = document.getElementById('about-stats');
  if (a.stats) {
    a.stats.forEach(s => {
      const b = document.createElement('div');
      b.className = 'stat';
      b.innerHTML = `<div class="stat-val">${s.value}</div><div class="stat-lbl">${s.label}</div>`;
      statsEl.appendChild(b);
    });
  }

  // bio paragraphs
  const bioEl = document.getElementById('about-bio');
  a.bio.forEach((p, i) => {
    const el = document.createElement('p');
    el.className = 'reveal-up';
    el.style.transitionDelay = (i * .1) + 's';
    el.innerHTML = p;
    bioEl.appendChild(el);
  });

  // details
  const detEl = document.getElementById('about-details');
  a.details.forEach(d => {
    detEl.innerHTML += `
      <div class="detail">
        <div class="detail-lbl">${d.label}</div>
        <div class="detail-val">${d.value}</div>
      </div>`;
  });
}

/* EXPERIENCE */
function renderExp(exp) {
  const track = document.getElementById('exp-track');
  exp.forEach((e, i) => {
    const card = document.createElement('div');
    card.className = 'exp-card';
    const imgStyle = e.imagePosition ? ` style="object-position:${e.imagePosition}"` : '';
    const imgHTML = e.image
      ? `<div class="exp-card-img"><img src="${e.image}" alt="${e.title}" loading="lazy"${imgStyle}></div>`
      : '';
    card.innerHTML = `
      ${imgHTML}
      <div class="exp-card-body">
        <div class="exp-num">0${i + 1}</div>
        <div class="exp-tag">${e.tag}</div>
        <div class="exp-title">${e.title}</div>
        <div class="exp-org">${e.org}</div>
        <div class="exp-desc">${e.description}</div>
      </div>`;
    track.appendChild(card);
  });
}

/* PROJECTS */
function renderProjects(projects) {
  if (!projects || !projects.length) return;
  const grid = document.getElementById('projects-grid');
  projects.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'project-card reveal';
    card.style.transitionDelay = (i * .1) + 's';
    card.innerHTML = `
      <div class="project-tag">${p.tag}</div>
      <div class="project-title">${p.title}</div>
      <div class="project-org">${p.org}</div>
      <div class="project-desc">${p.description}</div>`;
    grid.appendChild(card);
  });
}

/* RECOGNITION */
function renderRecog(press) {
  const grid = document.getElementById('recog-grid');
  press.forEach((p, i) => {
    const isLink = p.url && p.url !== '#';
    const card = document.createElement(isLink ? 'a' : 'div');
    card.className = 'recog-card reveal';
    card.style.transitionDelay = (i * .09) + 's';
    if (isLink) {
      card.href = p.url;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
    }
    const imgHTML = p.image
      ? `<div class="recog-img"><img src="${p.image}" alt="${p.source}" loading="lazy"></div>`
      : '';
    card.innerHTML = `
      ${imgHTML}
      <div class="recog-body">
        <div class="recog-source">${p.source}</div>
        <div class="recog-headline">${p.headline}</div>
        ${isLink ? `<div class="recog-link">Read more <span class="recog-link-arr">→</span></div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

/* CONTACT */
function renderContact(c) {
  const words = c.heading.split(' ');
  const last  = words.pop();
  document.getElementById('contact-heading').innerHTML =
    `${words.join(' ')}<em>${last}</em>`;

  document.getElementById('contact-body').textContent = c.body;

  const btns = document.getElementById('contact-btns');
  // LinkedIn first (first link only)
  const li = c.links[0];
  btns.innerHTML = `
    <a class="contact-btn magnetic" href="${li.url}" target="_blank" rel="noopener">
      <span>${li.label}</span>
      <span class="contact-btn-arr">↗</span>
    </a>
    <a class="contact-btn magnetic" href="mailto:${c.email}">
      <span>${c.email}</span>
      <span class="contact-btn-arr">→</span>
    </a>`;
  initMagnetic();
}

/* FOOTER */
function renderFooter(f) {
  document.getElementById('footer-name').textContent = f.name;
  document.getElementById('footer-note').textContent  = f.note;
}

/* INIT */
window.addEventListener('load', () => {
  loadData().then(() => {
    setTimeout(() => document.getElementById('loader').classList.add('out'), 950);
  });
});

</script>
</body>
</html>
